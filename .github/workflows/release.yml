name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npm run check
      - name: Publish version when it is not already on npm
        shell: bash
        run: |
          PACKAGE_SPEC=$(node -p "const p=require('./package.json'); p.name+'@'+p.version")
          if npm view "$PACKAGE_SPEC" version >/dev/null 2>&1; then
            echo "$PACKAGE_SPEC is already published; skipping npm publish."
          else
            npm publish --access public
          fi
      - run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
